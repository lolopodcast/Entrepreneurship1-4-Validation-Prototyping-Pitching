/* ───── Reusable Components ───── */
const FlipCard = ({ front, back, t }) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div className="perspective cursor-pointer h-36" onClick={() => setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-sm">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-xs text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4));
  const score = submitted ? quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length : 0;
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6">{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-sm">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    }`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {submitted && <div className="mb-4 p-3 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 rounded-lg font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {score}/{quizIndices.length}</div>}
      {!submitted
        ? <button onClick={() => { setSubmitted(true); const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; onQuizSubmit(moduleId, c, quizIndices.length); }}
            disabled={Object.keys(selected).length < quizIndices.length}
            className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 text-sm">{t.submit}</button>
        : <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg text-sm">{t.retry}</button>
      }
    </div>
  );
};

/* ───── Lab Components (Top-level, outside App) ───── */
const ElevatorPitchLab = ({lang}) => {
  const [pitchType, setPitchType] = useState('highConcept');
  const [audience, setAudience] = useState('');
  const [product, setProduct] = useState('');
  const [need, setNeed] = useState('');
  const [benefit, setBenefit] = useState('');
  const [competitor, setCompetitor] = useState('');
  const [diff, setDiff] = useState('');
  const zh = lang==='zh';
  const pitch = pitchType==='highConcept'
    ? (audience && product ? `${product} = ${audience}` : (zh?'請輸入兩個類比元素':'Enter two analogy elements'))
    : (audience && product && need && benefit && competitor && diff
      ? (zh?`針對${audience}，他們需要${need}，${product}是一個能${benefit}的方案。不同於${competitor}，我們${diff}。`
         :`For ${audience} who need ${need}, ${product} is a solution that ${benefit}. Unlike ${competitor}, we ${diff}.`)
      : (zh?'請填入所有欄位':'Fill in all fields'));
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{zh?'電梯簡報產生器':'Elevator Pitch Generator'}</h4>
      <div className="flex gap-2 mb-4">
        <button onClick={()=>setPitchType('highConcept')} className={`px-3 py-1 rounded-full text-sm font-bold ${pitchType==='highConcept'?'bg-[#004030] text-white dark:bg-[#D8C3A5] dark:text-[#004030]':'bg-slate-100 dark:bg-slate-700'}`}>{zh?'高概念類比':'High Concept'}</button>
        <button onClick={()=>setPitchType('twoSentence')} className={`px-3 py-1 rounded-full text-sm font-bold ${pitchType==='twoSentence'?'bg-[#004030] text-white dark:bg-[#D8C3A5] dark:text-[#004030]':'bg-slate-100 dark:bg-slate-700'}`}>{zh?'兩句式定位':'Two-Sentence'}</button>
      </div>
      {pitchType==='highConcept' ? (
        <div className="grid grid-cols-2 gap-3">
          <input value={product} onChange={e=>setProduct(e.target.value)} placeholder={zh?'你的產品（如：LinkedIn）':'Your product (e.g. LinkedIn)'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={audience} onChange={e=>setAudience(e.target.value)} placeholder={zh?'知名類比（如：Facebook for 專業人士）':'Analogy (e.g. Facebook for professionals)'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
        </div>
      ) : (
        <div className="grid grid-cols-2 gap-3">
          <input value={audience} onChange={e=>setAudience(e.target.value)} placeholder={zh?'目標受眾':'Target audience'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={need} onChange={e=>setNeed(e.target.value)} placeholder={zh?'他們的需求':'Their need'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={product} onChange={e=>setProduct(e.target.value)} placeholder={zh?'產品名稱':'Product name'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={benefit} onChange={e=>setBenefit(e.target.value)} placeholder={zh?'關鍵利益':'Key benefit'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={competitor} onChange={e=>setCompetitor(e.target.value)} placeholder={zh?'競爭者':'Competitor'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
          <input value={diff} onChange={e=>setDiff(e.target.value)} placeholder={zh?'關鍵差異':'Key difference'} className="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/>
        </div>
      )}
      <div className="mt-4 p-4 bg-[#004030]/5 dark:bg-[#D8C3A5]/10 rounded-lg">
        <p className="text-sm font-serif italic text-[#004030] dark:text-[#D8C3A5]">{pitch}</p>
      </div>
    </div>
  );
};

const InterviewSimLab = ({lang}) => {
  const zh = lang==='zh';
  const [step, setStep] = useState(0);
  const steps = zh
    ? [{t:'情境建立',d:'先詢問受訪者的背景、角色與日常工作。'},{t:'探索問題',d:'詢問他們遇到的最大困擾是什麼？上次遇到這個問題是什麼時候？'},{t:'了解現況',d:'他們目前如何解決這個問題？喜歡/不喜歡什麼？'},{t:'介紹方案',d:'簡要介紹你的構想，然後閉嘴，讓受訪者提問。'}]
    : [{t:'Set Context',d:'Ask about their background, role, and daily workflow.'},{t:'Explore Problem',d:'What is the biggest challenge they face? When did it last occur?'},{t:'Understand Current',d:'How do they solve it today? What do they like/dislike?'},{t:'Present Solution',d:'Briefly introduce your idea, then be quiet and let them ask questions.'}];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{zh?'顧客訪談流程模擬器':'Interview Flow Simulator'}</h4>
      <div className="flex gap-2 mb-4">
        {steps.map((_,i)=><button key={i} onClick={()=>setStep(i)} className={`w-10 h-10 rounded-full text-sm font-bold transition-all ${step===i?'bg-[#004030] text-white dark:bg-[#D8C3A5] dark:text-[#004030] scale-110':'bg-slate-100 dark:bg-slate-700 text-slate-500'}`}>{i+1}</button>)}
      </div>
      <div className="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-lg">
        <h5 className="font-bold text-[#004030] dark:text-[#D8C3A5] mb-1">{steps[step].t}</h5>
        <p className="text-sm">{steps[step].d}</p>
      </div>
      <div className="flex justify-between mt-4">
        <button onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0} className="px-4 py-1 text-sm rounded-lg border border-slate-200 dark:border-slate-600 disabled:opacity-30">{zh?'上一步':'Prev'}</button>
        <button onClick={()=>setStep(Math.min(3,step+1))} disabled={step===3} className="px-4 py-1 text-sm rounded-lg bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold disabled:opacity-30">{zh?'下一步':'Next'}</button>
      </div>
    </div>
  );
};

const SurveyDesignLab = ({lang}) => {
  const zh = lang==='zh';
  const [showBad, setShowBad] = useState(true);
  const bad = zh ? 'Q: 鑒於經濟情勢，你在哪裡買毛衣？\na. Amazon  b. 量販店  c. 服飾店  d. 其他網站' : 'Q: Given the economy, where do you buy sweaters?\na. Amazon  b. Mass merchants  c. Clothing stores  d. Other sites';

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">

  const descs = zh
    ? ['手繪草圖，幾分鐘即可完成。適合快速迭代多種設計方向。','使用 Balsamiq 等線框工具，呈現基本版面與互動流程。','完整視覺設計，包含品牌色彩與字型，需設計師參與。']

      { q: "訪談結束後應該怎麼做？", opts: ["立即修改產品設計","立刻記錄所有細節，等全部訪談完成後再歸納結論","忘掉不好的回饋","把結果發給受訪者確認"], ans: 1, exp: "趁記憶鮮明時寫下所有細節，但不要在個別訪談後就急著下結論，要等全部完成後看整體模式。" }
    ],

    // M3 問卷調查
    m3_nav: "3. 問卷調查",
    m3_title: "問卷調查：以數據規模化驗證假設",
    m3_p1: "Ethan Mollick 教授指出，問卷調查應在訪談之後進行——訪談幫助你發現正確的問題，問卷則幫助你以規模化的方式驗證這些發現。問卷有兩大用途：說服他人（如投資人）與分析市場。",
    m3_p2: "「問卷設計是一門科學：一個措辭不當的問題，可能導致整份調查的結果毫無價值。前測（Pretest）是確保問卷品質的唯一方法。」",
    m3_p3: "樣本來源包括便利樣本（同學、朋友、Facebook）、付費樣本（Mechanical Turk、Google Surveys、專業調查公司）與定向廣告（LinkedIn、Facebook Ads）。題型設計的關鍵原則：避免引導性問題、提供完整選項（含「以上皆非」與「其他」）、使用適當的量表（5 點量表優於 10 點）、定價題使用隨機化單價法（Monadic）而非階梯法。",
    m3_case_title: "微個案：Dropbox 的驗證影片",
    m3_case: "2007 年，Drew Houston 面臨一個難題：他的雲端同步產品 Dropbox 技術上極為複雜，無法在短時間內做出原型來測試市場反應。他的解決方案是製作一支三分鐘的展示影片，上傳到科技論壇 Hacker News。影片精確展示了產品如何運作——拖放檔案即自動同步——並刻意加入幾個只有技術社群才懂的彩蛋。隔夜之間，Dropbox 的等候名單從 5,000 人暴增到 75,000 人。Houston 不需要問卷就驗證了需求，但這個案例說明了驗證的本質：在大量投入之前，找到最低成本的方式證明人們確實想要你的產品。",
    m3_cards: [
      { title: "題型設計：不良 vs. 改善", desc: "✗「鑒於經濟情勢，你在哪裡買毛衣？」\n→ 引導性用語、選項不完整\n\n✓「過去 12 個月，你最常在哪裡購買毛衣？」\n→ 具體時間範圍、含「未購買」選項" },
      { title: "定價題：最佳做法", desc: "✗ 直接問「你願付多少錢？」（變成談判）\n✗ 價格階梯法（引導偏誤）\n\n✓ 隨機化單價法（Monadic）：\n隨機呈現一個價格，問接受程度\n✓ 最佳方法：聯合分析（Conjoint Analysis）" }
    ],
    m3_terms: [
      { front: "前測 Pretest", back: "在正式發放問卷前，先以小樣本測試，確認題目清晰、選項完整、沒有引導偏誤，並檢查填答時間是否合理。" },
      { front: "隨機化單價法 Monadic Testing", back: "每位受訪者只看到一個價格水準，評估其接受度。避免價格階梯法造成的錨定效應與談判心態。" },
      { front: "便利樣本 Convenience Sample", back: "從身邊容易取得的群體抽樣（同學、朋友等）。成本低但代表性有限，需注意偏誤。" }
    ],
    m3_q: [
      { q: "問卷調查應在什麼之後進行？", opts: ["產品上市之後","原型開發之後","顧客訪談之後","融資完成之後"], ans: 2, exp: "訪談幫助發現正確的問題，問卷則用來規模化驗證這些發現。" },
      { q: "以下哪種定價調查方法最容易產生偏誤？", opts: ["隨機化單價法","聯合分析","價格階梯法","開放式問答"], ans: 2, exp: "價格階梯法讓受訪者看到多個價格，容易產生錨定效應。" },
      { q: "問卷的回應率低於多少時需要特別注意偏誤？", opts: ["50%","30%","20%","10%"], ans: 2, exp: "低於 20% 的回應率表示大多數人沒有回答，留下的回覆可能不具代表性。" },
      { q: "前測（Pretest）主要檢查什麼？", opts: ["問卷的色彩設計","題目的清晰度、選項完整性、偏誤與填答時間","受訪者的信用評等","問卷的列印品質"], ans: 1, exp: "前測需確認受訪者能理解題意、選項無遺漏、沒有引導偏誤，以及時間合理。" },
      { q: "Dropbox 的案例說明了驗證的什麼原則？", opts: ["一定要做問卷才算驗證","用最低成本的方式證明需求存在","技術越複雜越好","忽略使用者回饋"], ans: 1, exp: "Houston 用一支影片就驗證了需求——不一定需要實體產品或大規模問卷。" },
      { q: "為什麼問卷中應避免使用「鑒於經濟情勢」這類措辭？", opts: ["太長了","這是引導性用語，暗示應該考慮價格因素","語法不正確","受訪者不懂經濟"], ans: 1, exp: "引導性用語會影響受訪者的回答方向，導致結果偏誤。" },
      { q: "對於大型母體、95% 信心水準、±5% 誤差，所需樣本數約為？", opts: ["96 人","267 人","384 人","1000 人"], ans: 2, exp: "384 人是統計學公式計算的標準值（95% CL, ±5%）。" },
      { q: "下列哪種問卷選項設計較佳？", opts: ["只提供 4 個選項","提供完整選項，包含「以上皆非」與「其他」","只用開放式問答","不提供選項讓受訪者自由發揮"], ans: 1, exp: "完整選項避免受訪者被迫選擇不適合的答案，「其他」欄位捕捉意外回覆。" }
    ],

    // M4 實體產品原型
    m4_nav: "4. 實體原型",
    m4_title: "實體產品原型開發：從概念到實體",
    m4_p1: "Karl T. Ulrich 教授指出，原型的核心目的有二：為自己學習與解決問題，以及向他人證明你的方案可行。原型不需要一次到位——它是一個漸進的過程，從概念驗證（Proof of Concept）到 Alpha、Beta、再到預量產階段。",
    m4_p2: "「原型的價值不在於它有多精美，而在於它能回答多少關鍵問題。一個粗糙但有啟發性的原型，勝過一個精美但沒有驗證任何假設的成品。」",
    m4_p3: "原型可以是聚焦型（只測試一兩個面向，如手感或外觀）或全面型（完整功能的產品）。現代快速成型工具（如 3D 列印）大幅降低了原型成本。與供應商合作有兩種模式：ODM（原廠設計製造，設計免費但無專利保護）與自有設計（需投入設計資源但擁有智慧財產權）。",
    m4_case_title: "微個案：Belle-V 冰淇淋勺的 30 次迭代",
    m4_case: "Wharton 教授 Karl Ulrich 在課堂上示範了如何從零打造一支冰淇淋勺。他先用木塊雕刻粗略的手感原型，測試握持的舒適度；接著繪製精確的工程圖，再透過 3D 列印服務商 Shapeways 製作塑料原型。整個過程經歷了超過 30 次迭代——每次只改變一個變數（勺子的曲率、握柄的粗細、重量分佈）。最終的不鏽鋼成品在 Kickstarter 上成功集資並商業化銷售。這個案例證明：即使是看似簡單的產品，也需要大量的原型迭代才能達到最佳設計。",
    m4_cards: [
      { title: "原型四階段", desc: "1. 概念驗證（Proof of Concept）：技術可行嗎？\n2. Alpha：初步功能原型\n3. Beta：接近完成品，供使用者測試\n4. 預量產：確認可製造性" },
      { title: "聚焦型 vs. 全面型", desc: "聚焦型：只驗證一個面向（如外觀模型、功能測試台）\n→ 速度快、成本低\n\n全面型：完整功能的產品\n→ 適合後期驗證" }
    ],
    m4_terms: [
      { front: "概念驗證 Proof of Concept", back: "最早期的原型，只驗證核心技術或機制是否可行，不追求外觀或完整功能。" },
      { front: "ODM 原廠設計製造", back: "Original Design Manufacturer：由工廠根據你的需求設計產品，設計費通常免費，但你不擁有設計的智慧財產權。" },
      { front: "3D 列印 3D Printing", back: "快速成型技術，可在數小時內將數位設計轉為實體模型，大幅降低原型成本與時間。" }
    ],
    m4_q: [
      { q: "原型的兩個核心目的是什麼？", opts: ["賺錢與宣傳","為自己學習解決問題，以及向他人證明可行性","美觀與耐用","節省成本與縮短時間"], ans: 1, exp: "原型幫助你回答問題、解決技術挑戰（為自己），也用來說服投資人與合作夥伴（為他人）。" },
      { q: "原型的四個階段依序是？", opts: ["Alpha、Beta、Gamma、Delta","概念驗證、Alpha、Beta、預量產","設計、開發、測試、上市","草圖、線框、視覺、互動"], ans: 1, exp: "從最粗糙的概念驗證開始，逐步精進到可量產的階段。" },
      { q: "Belle-V 冰淇淋勺經歷了約多少次原型迭代？", opts: ["5 次","15 次","30 次以上","100 次"], ans: 2, exp: "每次只改變一個變數，累積超過 30 次迭代才達到最佳設計。" },
      { q: "ODM 模式的主要缺點是？", opts: ["設計費用昂貴","你不擁有設計的智慧財產權","品質通常較差","交貨速度慢"], ans: 1, exp: "ODM 的設計費通常「免費」，但正因如此，你的競爭者也可以取得相同設計——沒有專屬性。" },
      { q: "聚焦型原型的優勢是？", opts: ["可以直接銷售","速度快、成本低，可快速驗證特定假設","外觀最精美","不需要任何工具"], ans: 1, exp: "聚焦型原型只測試一兩個面向，因此開發速度快且成本低。" },
      { q: "3D 列印在原型開發中的主要價值是？", opts: ["可直接量產","大幅降低原型成本與製作時間","取代所有傳統製造","提升產品強度"], ans: 1, exp: "3D 列印讓創業者在數小時內就能將數位設計轉為實體模型，加速迭代。" },
      { q: "「原型的價值不在於精美，而在於回答問題」暗示什麼？", opts: ["原型不需要任何品質","原型應優先服務於學習，而非展示","只有粗糙的原型才有價值","美觀的原型一定是浪費"], ans: 1, exp: "原型的首要目的是驗證假設與解決問題，而非追求視覺完美。" },
      { q: "預量產階段的原型主要驗證什麼？", opts: ["市場需求","製造可行性與一致性","品牌設計","定價策略"], ans: 1, exp: "預量產原型確認產品可以用量產製程穩定製造，而非只是手工一件。" }
    ],

    // M5 軟體原型
    m5_nav: "5. 軟體原型",
    m5_title: "軟體原型開發：以最低成本釐清介面與功能",
    m5_p1: "Kartik Hosanagar 教授指出，軟體原型有兩大目的：釐清使用者介面（UI）與確認功能需求。原型可沿三個維度分類：生命週期（拋棄式 vs. 演進式）、保真度（低/中/高）、互動性（靜態 vs. 互動）。",
    m5_p2: "「你不需要是設計師才能參與原型設計——用紙筆畫出低保真草圖，是每位創辦人都應該做的事。幾分鐘內你就能迭代出多種設計方向。」",
    m5_p3: "實務建議：先以紙筆繪製低保真靜態草圖→收集初步回饋→使用 Balsamiq/Axure 等工具製作中高保真互動原型→迭代至滿意→凍結設計，進入開發。創辦人即使沒有設計背景，也應主導低保真階段的設計工作。",
    m5_case_title: "微個案：SmartyPal 從草圖到產品",
    m5_case: "Kartik Hosanagar 教授自己共同創辦了兒童教育應用程式 SmartyPal。他從最粗糙的手繪草圖開始——在紙上畫出 Logo 位置、內容區塊、行動呼籲按鈕的大致布局。第一版草圖只花了幾分鐘，但它讓團隊得以討論「影片放在頁面頂部還是底部」「是否需要客戶推薦語」等關鍵決策。接著，他嘗試了三種不同的版面策略：影片主導型、三步驟型、以及情感訴求型。每種設計各有取捨——影片主導型有說服力但製作成本高，三步驟型直觀但缺乏情感連結。最終，他結合了全螢幕情感照片與功能特色列表的混合方案。啟示：低保真原型的最大價值不在於畫面本身，而在於它能引發的設計對話。",
    m5_cards: [
      { title: "保真度三階段", desc: "低保真：手繪草圖，幾分鐘完成\n中保真：線框工具（如 Balsamiq），有基本排版\n高保真：完整視覺設計，需設計師參與" },
      { title: "靜態 vs. 互動", desc: "靜態：一系列畫面截圖，適合驗證視覺設計\n互動：可點擊、可輸入，模擬真實操作體驗\n→ 複雜產品建議使用互動原型" }
    ],
    m5_terms: [
      { front: "拋棄式原型 Throwaway Prototype", back: "建立模型供使用者評估，取得回饋後凍結設計，原型即可丟棄。優點是速度快。" },
      { front: "演進式原型 Evolutionary Prototype", back: "從已理解的部分開始建構，原型逐漸演進成最終產品。適合需求明確的專案。" },
      { front: "線框圖 Wireframe", back: "中保真原型工具，展示頁面的結構與排版，不含完整視覺設計。常用工具：Balsamiq、Axure。" }
    ],
    m5_q: [
      { q: "軟體原型的兩大目的是？", opts: ["賺錢與宣傳","釐清使用者介面（UI）與確認功能需求","美觀與效能","速度與安全"], ans: 1, exp: "原型幫助團隊和使用者共同釐清「介面長什麼樣」和「應該支援哪些功能」。" },
      { q: "以下哪種原型最適合在專案早期快速迭代？", opts: ["高保真互動原型","低保真靜態草圖","完整開發的 MVP","演進式原型"], ans: 1, exp: "紙筆草圖幾分鐘就能完成一個版本，可以快速探索多種設計方向。" },
      { q: "拋棄式原型與演進式原型的關鍵差異是？", opts: ["拋棄式更貴","拋棄式在取得回饋後丟棄，演進式逐漸變成最終產品","演進式更快","沒有差異"], ans: 1, exp: "拋棄式用來快速收集回饋然後重新開始，演進式從一開始就朝最終產品演進。" },
      { q: "為什麼創辦人即使沒有設計背景，也應參與低保真原型設計？", opts: ["為了節省設計師費用","低保真原型讓創辦人能與設計師和使用者進行有意義的對話","為了展示技術能力","法律要求"], ans: 1, exp: "創辦人最了解產品願景，低保真草圖讓他能主導設計方向並與團隊溝通。" },
      { q: "SmartyPal 案例中，低保真原型的最大價值是什麼？", opts: ["精美的視覺效果","引發團隊內部的設計決策對話","直接拿去融資","取代了開發團隊"], ans: 1, exp: "草圖本身不需要精美，但它讓團隊能具體討論版面策略的取捨。" },
      { q: "互動原型最適合什麼情境？", opts: ["產品非常簡單","產品複雜，使用體驗是關鍵差異點","只需要驗證品牌色彩","預算非常有限"], ans: 1, exp: "當產品複雜且 UX 是核心賣點時，靜態截圖無法呈現操作體驗，需要互動原型。" },
      { q: "正確的原型開發順序是？", opts: ["高保真 → 低保真 → 開發","低保真靜態 → 回饋 → 中高保真互動 → 迭代 → 凍結 → 開發","直接開發 → 測試 → 修改","開發 → 原型 → 設計"], ans: 1, exp: "從粗到細、從靜到動，每個階段都收集回饋再前進。" },
      { q: "以下哪種工具適合製作中高保真互動原型？", opts: ["紙筆","Photoshop","Balsamiq / Axure","Visual Studio"], ans: 2, exp: "Balsamiq 和 Axure 是專門的線框與互動原型工具，介於手繪與完整開發之間。" }
    ],

    // M6 服務原型
    m6_nav: "6. 服務原型",
    m6_title: "服務原型開發：綠野仙蹤法與最小可行服務",
    m6_p1: "Karl T. Ulrich 教授指出，服務業的原型挑戰與實體產品和軟體不同：服務通常需要自行營運（餐廳自己開、航空公司自己飛），而非委託製造商。但這不代表你必須在驗證前就建好完整的營運體系。",
    m6_p2: "「綠野仙蹤法的精髓是：給顧客完整的前端體驗，但在幕後用最簡陋的方式手動完成。你驗證的是顧客需求，而非營運效率——營運效率是需求確認後才需要解決的問題。」",
    m6_p3: "關鍵策略是「綠野仙蹤法」（Wizard of Oz）——讓顧客看到完美的前端體驗，而你在幕後手動搞定一切。這個方法的名稱來自《綠野仙蹤》中那位躲在簾幕後面操控巨大螢幕的小人。對服務業創業者來說，最重要的問題是：你到底需要建構多少系統，才能讓顧客體驗到你的核心價值主張？",
    m6_case_title: "微個案：Caviar 的腳踏車外送",
    m6_case: "Jason Wang 原本在舊金山經營另一家新創公司。他和團隊每天的午餐問題——特別是他們最愛的韓式墨西哥捲餅——讓他萌生了創辦精選食物外送平台的念頭。但他沒有花數月建構外送車隊和餐廳合作網路。相反地，他只做了兩件事：建立一個漂亮的前端 App，然後親自騎腳踏車去餐廳買食物、再送到客戶手上。客戶通過 App 下單，看到的是完美的數位體驗；但在幕後，是 Wang 本人在騎車奔波。這讓他在零營運投資的情況下驗證了核心假設：城市居民願意為精選的高品質餐廳外送服務付費。Caviar 僅成立兩年就以 1 億美元出售給 Square。啟示：服務驗證的關鍵不是建構完美的後端系統，而是儘快讓顧客體驗到你的核心價值。",
    m6_cards: [
      { title: "綠野仙蹤法", desc: "前端：顧客看到精美的 App / 網站\n幕後：創辦人手動完成所有工作\n\n目的：驗證需求，而非營運效率\n優點：零基礎建設投資即可測試" },
      { title: "服務業原型的獨特挑戰", desc: "• 通常需要自行營運（非外包製造）\n• 不需大量硬體投資\n• 核心問題：你需要建構多少，才能驗證顧客是否買單？" }
    ],
    m6_terms: [
      { front: "綠野仙蹤法 Wizard of Oz", back: "服務原型策略：前端提供完整的顧客體驗，後端由人工手動操作。名稱源自電影中幕後操控螢幕的角色。" },
      { front: "最小可行服務 Minimum Viable Service", back: "只建構能讓顧客體驗到核心價值的最少系統，其餘以手動或臨時方案替代，以最低成本驗證需求。" },
      { front: "前端體驗 vs. 後端營運", back: "驗證階段應優先投資前端體驗（顧客看得到的），後端營運效率可在需求確認後再優化。" }
    ],
    m6_q: [
      { q: "「綠野仙蹤法」的名稱來自什麼？", opts: ["一種程式語言","電影中躲在幕後操控的角色","一種統計方法","一位創業家的名字"], ans: 1, exp: "《綠野仙蹤》中的巫師其實是躲在簾幕後面的小人——服務原型的精髓就是如此。" },
      { q: "Caviar 的創辦人 Jason Wang 如何驗證食物外送的需求？", opts: ["花了一年建構外送車隊","做了大規模市場調查","只建了前端 App，自己騎腳踏車送餐","請了一百位外送員"], ans: 2, exp: "Wang 用最少的投資驗證了最關鍵的假設：人們願意為精選外送付費。" },
      { q: "服務業原型與實體產品原型的主要差異是？", opts: ["服務不需要原型","服務通常需自行營運，但可用手動方式模擬","服務原型更昂貴","服務無法被驗證"], ans: 1, exp: "服務不像產品可以外包製造，但可以用綠野仙蹤法在小規模手動驗證。" },
      { q: "綠野仙蹤法驗證的是什麼？", opts: ["營運效率","系統可擴展性","顧客需求是否存在","技術架構是否正確"], ans: 2, exp: "營運效率是後續問題，綠野仙蹤法的首要目的是驗證「有沒有人要買」。" },
      { q: "Caviar 最終的結局是？", opts: ["倒閉了","以 1 億美元出售給 Square","成為獨角獸","被 Uber Eats 收購"], ans: 1, exp: "Caviar 僅成立兩年就以 1 億美元被 Square 收購，驗證了其商業模式的價值。" },
      { q: "服務創業者在驗證階段最應該問自己的問題是？", opts: ["要雇多少員工","需要建構多少系統，才能讓顧客體驗核心價值","如何達到最高利潤率","如何取得專利"], ans: 1, exp: "建構最少的系統讓顧客能體驗核心價值——這就是最小可行服務的精神。" },
      { q: "以下哪個不是服務業原型的特點？", opts: ["通常需自行營運","不需大量硬體投資","必須建構完整後端系統才能開始","可用手動方式模擬服務"], ans: 2, exp: "綠野仙蹤法的核心就是不需要完整後端系統——手動搞定即可驗證。" },
      { q: "為什麼前端體驗比後端營運更值得優先投資？", opts: ["後端不重要","前端決定顧客是否買單——這是驗證的核心","前端比較便宜","法律要求"], ans: 1, exp: "驗證階段的目標是確認需求，而需求取決於顧客體驗到的前端——後端效率可以後續再優化。" }
    ],

    m1_nav: "1. Elevator Pitch",
    m1_title: "The Art of the Elevator Pitch: Talking Your Idea Into Existence",
    m1_p1: "Prof. Ethan Mollick cites Karl Weick's insight: 'A business is talked into existence.' Your venture doesn't exist yet—the elevator pitch is your first tool for convincing the world, using 20-30 seconds to spark a conversation worth continuing.",
    m1_p2: "\"The goal of an elevator pitch isn't to convince someone to write a check—it's to prompt the right question: one that shows they understand your business and want to keep talking.\"",
    m1_p3: "Two core methods: (1) High Concept Pitch—from Hollywood, using analogy ('Jaws in Space' = Aliens). (2) Two-Sentence Positioning Statement—covering target audience, product name, category, key benefit, competitor, and differentiation. Advanced versions add a Hook, Team description, and Ask.",
    m1_case_title: "Micro Case: Airbnb's Elevator Pitch",
    m1_case: "In 2009, Brian Chesky, Joe Gebbia, and Nathan Blecharczyk faced a funding crisis. Their pitch opened with seven words: 'Book rooms with locals, not hotels.' This single sentence communicated three layers of value: travelers save money, hosts earn income, and both gain cultural connection. With this pitch deck, they raised $600K from Sequoia Capital. The key to success: conveying the core value proposition in the fewest possible words, naturally prompting investors to ask 'How does this work?'",
    m1_cards: [
      { title: "High Concept Analogy", desc: "Describe your product via known references.\n✓ 'Facebook for professionals' = LinkedIn\n✓ 'All-electric Porsche' = Tesla Roadster\n✗ 'Warby Parker meets Netflix for pets' = ???" },
      { title: "Two-Sentence Positioning", desc: "For [target audience] who [have a need],\n[product name] is a [product category]\nthat [offers key benefit].\nUnlike [competitor], we [key difference]." }
    ],
    m1_terms: [
      { front: "Elevator Pitch", back: "A concise 20-30 second business description designed to prompt the right follow-up question and start a deeper conversation." },
      { front: "High Concept Pitch", back: "Hollywood-origin method using 'X for Y' analogy to quickly communicate product positioning (e.g., 'Jaws in Space' = Aliens)." },
      { front: "Product Positioning Statement", back: "Two-sentence framework covering target audience, need, product category, key benefit, and competitive differentiation." }
    ],
    m1_q: [
      { q: "What is the primary goal of an elevator pitch?", opts: ["Convince investors to sign a check immediately","Prompt a quality question showing they understand your business","Detail every aspect of the business model","Showcase all technical specifications"], ans: 1, exp: "The core goal is to start a meaningful conversation, not close a deal in 30 seconds." },
      { q: "'Facebook for professionals' describes which company?", opts: ["Twitter","LinkedIn","Slack","Microsoft Teams"], ans: 1, exp: "LinkedIn can be analogized as 'Facebook for professionals'—same social network concept but sharing professional rather than personal content." },
      { q: "Which element is NOT part of the two-sentence positioning statement?", opts: ["Target audience","Key benefit","Detailed financial projections","Competitive differentiation"], ans: 2, exp: "The two-sentence pitch covers audience, need, product, benefit, and differentiation—not detailed financials." },
      { q: "What three advanced elements can enhance an elevator pitch?", opts: ["Market size, competitive analysis, financial model","Hook, Team, Ask","Tech architecture, timeline, test plan","Patent count, revenue data, user numbers"], ans: 1, exp: "Hook creates intrigue (e.g., market size), Team builds credibility, Ask drives action." },
      { q: "A common pitfall of high concept pitches is:", opts: ["Being too brief","Overly complex or forced analogies that confuse the audience","Not mentioning competitors","Not mentioning price"], ans: 1, exp: "'Warby Parker meets Netflix for pets' is a failed example—the audience can't understand what you actually do." },
      { q: "What was the key to Airbnb's seed round pitch success?", opts: ["Detailed five-year financial projections","Conveying the core value proposition in the fewest words","Listing all technical patents","Promising extremely high ROI"], ans: 1, exp: "'Book rooms with locals, not hotels'—seven words that conveyed the complete value proposition." },
      { q: "Why prepare different pitch versions for different audiences?", opts: ["Legal requirement","Different audiences care about different aspects","To make pitches longer","To confuse competitors"], ans: 1, exp: "Investors care about returns, customers about value, experts about feasibility—tailor accordingly." },
      { q: "Weick's quote 'A business is talked into existence' implies:", opts: ["Entrepreneurship only requires good speaking skills","Communication is the starting point for gathering resources and supporters","Businesses exist only in language","Pitches matter more than products"], ans: 1, exp: "From non-existence to existence, a business needs persuasion to acquire resources, customers, and team members." }
    ],

    m2_nav: "2. Interviews",
    m2_title: "Customer Interviews: Extracting Insights from Real Needs",
    m2_p1: "Prof. Ethan Mollick emphasizes that every entrepreneur should conduct at least three customer interviews (ideally 5-8) before launching. Interviews are about listening—understanding how customers solve problems today, why they chose current solutions, and where pain points lie.",
    m2_p2: "\"Interviews excel at revealing 'what is'—customers' current behaviors, choices, and pain points. But they fail at predicting 'what will be'—you can't ask customers to design your product or predict their future purchasing behavior.\"",
    m2_p3: "Three types of interviewees: (1) Potential users/customers—learn about needs and current solutions. (2) Potential buyers—they may not be users but hold purchasing authority. (3) Industry experts—provide deep context on market structure, regulation, and trends. Interview flow: establish context first, explore the problem, then introduce your solution last.",
    m2_case_title: "Micro Case: Slack's Double Pivot",
    m2_case: "Stewart Butterfield founded two game companies that both pivoted into revolutionary communication platforms. First, his game 'Game Neverending' ran out of money, but the photo-sharing feature the team built became hugely popular—that was Flickr. Second, his game 'Glitch' had passionate fans but 97% of users left within five minutes. However, the internal chat tool the team used was something nobody could live without—that became Slack. Butterfield's key insight came from observing users' actual behavior rather than their stated preferences. Slack was eventually acquired by Salesforce for $27.7 billion. Lesson: Observing real user behavior often reveals opportunities you never anticipated.",
    m2_cards: [
      { title: "Interviews Are Great For", desc: "✓ Understanding how customers solve problems today\n✓ Discovering what they like/dislike about current solutions\n✓ Understanding customer context and environment\n✓ Getting design inspiration" },
      { title: "Interviews Are Bad For", desc: "✗ Predicting future purchasing behavior\n✗ Estimating demand\n✗ Setting pricing (becomes negotiation)\n✗ Wish-list features (unrealistic demands)" }
    ],
    m2_terms: [
      { front: "Customer Interview", back: "A structured deep conversation aimed at understanding users' needs, pain points, and existing solutions—not selling your product." },
      { front: "User vs. Customer", back: "Users operate the product (e.g., doctors); customers pay for it (e.g., hospitals). They may be different stakeholders." },
      { front: "Open-ended Questions", back: "Questions that can't be answered with 'yes/no,' such as 'Tell me about the last time you encountered this problem,' eliciting rich stories and context." }
    ],
    m2_q: [
      { q: "How many customer interviews should entrepreneurs conduct minimum before launch?", opts: ["1","3","10","50"], ans: 1, exp: "At least 3 (ideally 5-8). Two interviews create false patterns; the third reveals true complexity." },
      { q: "Which is NOT an appropriate interview goal?", opts: ["Understanding pain points","Learning about current solutions","Determining product pricing","Understanding customer context"], ans: 2, exp: "Discussing price in interviews turns into negotiation, yielding unreliable information." },
      { q: "What should you discuss first in an interview?", opts: ["Your product solution","The interviewee's background and context","Your business model","Funding needs"], ans: 1, exp: "Start by making them comfortable and understanding their context before diving into problems and solutions." },
      { q: "What key principle does Slack's story illustrate?", opts: ["Games always make more money than chat tools","Observing actual user behavior matters more than what people say","Great technology always succeeds","Your first idea is usually the best"], ans: 1, exp: "Butterfield noticed the team couldn't live without the chat tool, not the game—behavior revealed the real need." },
      { q: "In the medical startup case, interviews revealed what surprise?", opts: ["Doctors desperately needed the product","Insurance reimbursement policy was the key factor","The product had technical flaws","Patients refused to use it"], ans: 1, exp: "Interviews revealed the value chain complexity: doctors → hospitals → insurers. Reimbursement policy determined the business model." },
      { q: "Why shouldn't you ask 'What features do you want' in interviews?", opts: ["Interviewees will lie","They don't understand cost constraints and will make unrealistic demands","The question is too simple","They won't answer"], ans: 1, exp: "Customers will ask for products that are 'free, can fly, and give superpowers'—they don't understand constraints." },
      { q: "The three types of interviewees do NOT include:", opts: ["Potential users","Potential buyers","Industry experts","Competitor investors"], ans: 3, exp: "The three types are users (needs), buyers (decisions), and experts (context)." },
      { q: "What should you do after interviews?", opts: ["Immediately redesign the product","Record all details promptly; wait until all interviews are done to draw conclusions","Ignore negative feedback","Send results to interviewees for confirmation"], ans: 1, exp: "Write everything down while fresh, but don't jump to conclusions until you can see patterns across all interviews." }
    ],

    m3_nav: "3. Surveys",
    m3_title: "Survey Design: Validating Hypotheses at Scale",
    m3_p1: "Prof. Ethan Mollick notes that surveys should follow interviews—interviews help discover the right questions; surveys help validate findings at scale. Surveys serve two purposes: convincing others (e.g., investors) and analyzing the market.",
    m3_p2: "\"Survey design is a science: one poorly worded question can render the entire survey worthless. Pretesting is the only way to ensure quality.\"",
    m3_p3: "Sample sources include convenience samples (classmates, friends, Facebook), purchased samples (Mechanical Turk, Google Surveys, professional panels), and targeted ads (LinkedIn, Facebook Ads). Key design principles: avoid leading questions, provide complete options (including 'none' and 'other'), use appropriate scales (5-point preferred over 10-point), and use monadic randomized pricing instead of ladder pricing.",
    m3_case_title: "Micro Case: Dropbox's Validation Video",
    m3_case: "In 2007, Drew Houston faced a dilemma: Dropbox was technically complex and couldn't be quickly prototyped for market testing. His solution was a 3-minute demo video posted to Hacker News. The video precisely showed how the product worked—drag and drop files for automatic syncing—and deliberately included Easter eggs only the tech community would appreciate. Overnight, the waitlist surged from 5,000 to 75,000. Houston didn't need a survey to validate demand, but this case illustrates the essence of validation: finding the lowest-cost way to prove people actually want your product before investing heavily.",
    m3_cards: [
      { title: "Question Design: Bad vs. Better", desc: "✗ 'Given the economy, where do you buy sweaters?'\n→ Leading language, incomplete options\n\n✓ 'Where have you bought most sweaters in the past 12 months?'\n→ Specific timeframe, includes 'have not purchased'" },
      { title: "Pricing Questions: Best Practice", desc: "✗ Directly asking 'How much would you pay?' (negotiation)\n✗ Price ladders (anchoring bias)\n\n✓ Monadic: randomly show one price, ask acceptance\n✓ Best method: Conjoint Analysis" }
    ],
    m3_terms: [
      { front: "Pretest", back: "Testing the survey with a small sample before full deployment to verify clarity, completeness, absence of bias, and reasonable completion time." },
      { front: "Monadic Testing", back: "Each respondent sees only one price level and rates acceptance. Avoids anchoring effects and negotiation mindset from price ladders." },
      { front: "Convenience Sample", back: "Sampling from easily accessible groups (classmates, friends). Low cost but limited representativeness; watch for bias." }
    ],
    m3_q: [
      { q: "Surveys should be conducted after:", opts: ["Product launch","Prototype development","Customer interviews","Fundraising"], ans: 2, exp: "Interviews discover the right questions; surveys validate those findings at scale." },
      { q: "Which pricing survey method is most prone to bias?", opts: ["Monadic testing","Conjoint analysis","Price ladder","Open-ended questions"], ans: 2, exp: "Price ladders show multiple prices, easily creating anchoring effects." },
      { q: "Response rates below what percentage are concerning?", opts: ["50%","30%","20%","10%"], ans: 2, exp: "Below 20% means most people didn't respond; remaining replies may not be representative." },
      { q: "What does pretesting primarily check?", opts: ["Survey color design","Clarity, option completeness, bias, and completion time","Respondent credit scores","Print quality"], ans: 1, exp: "Pretesting ensures respondents understand questions, options are complete, there's no leading bias, and timing is reasonable." },
      { q: "What validation principle does the Dropbox case illustrate?", opts: ["Surveys are always necessary for validation","Finding the lowest-cost way to prove demand exists","More complex tech is always better","Ignore user feedback"], ans: 1, exp: "Houston validated demand with just a video—you don't always need a physical product or large-scale survey." },
      { q: "Why should surveys avoid phrases like 'given the economy'?", opts: ["Too long","It's leading language that biases responses toward price sensitivity","Grammatically incorrect","Respondents don't understand economics"], ans: 1, exp: "Leading language influences response direction, causing biased results." },
      { q: "For a large population, 95% CL, ±5% margin, the required sample size is approximately:", opts: ["96","267","384","1000"], ans: 2, exp: "384 is the standard statistical calculation (95% confidence level, ±5% margin of error)." },
      { q: "Which option design approach is better?", opts: ["Only provide 4 options","Provide complete options including 'none of the above' and 'other'","Only use open-ended questions","Provide no options, let respondents write freely"], ans: 1, exp: "Complete options prevent forced choices; 'other' captures unexpected responses." }
    ],

    m4_nav: "4. Physical Prototypes",
    m4_title: "Physical Product Prototyping: From Concept to Reality",
    m4_p1: "Prof. Karl T. Ulrich notes that prototypes serve two core purposes: learning and problem-solving for yourself, and proving feasibility to others. Prototyping is progressive—from Proof of Concept to Alpha, Beta, and Pre-production stages.",
    m4_p2: "\"A prototype's value lies not in how polished it looks, but in how many key questions it answers. A rough but insightful prototype beats a beautiful one that validates nothing.\"",
    m4_p3: "Prototypes can be focused (testing just one or two dimensions, like feel or appearance) or comprehensive (fully functioning product). Modern rapid prototyping tools (like 3D printing) dramatically reduce costs. Two supplier collaboration models: ODM (factory designs for you—free but non-proprietary) and proprietary design (you invest in design but own the IP).",
    m4_case_title: "Micro Case: Belle-V's 30+ Iterations",
    m4_case: "Wharton Prof. Karl Ulrich demonstrated building an ice cream scoop from scratch. He started with carved wooden blocks to test grip comfort, then created precise engineering drawings, followed by 3D-printed prototypes via Shapeways. The process involved 30+ iterations—each changing just one variable (scoop curvature, handle thickness, weight distribution). The final stainless steel product was successfully crowdfunded on Kickstarter and commercially sold. This case proves: even seemingly simple products require extensive prototype iteration to achieve optimal design.",
    m4_cards: [
      { title: "Four Prototype Stages", desc: "1. Proof of Concept: Is the tech feasible?\n2. Alpha: Initial functional prototype\n3. Beta: Near-final product for user testing\n4. Pre-production: Confirm manufacturability" },
      { title: "Focused vs. Comprehensive", desc: "Focused: Tests one aspect (e.g., appearance model, function test rig)\n→ Fast and low-cost\n\nComprehensive: Fully functioning product\n→ Suitable for later-stage validation" }

function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [analytics, setAnalytics] = useState({
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0)
  });
  const contentRef = useRef(null);
  const menuRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { window.scrollTo({top:0}); window.speechSynthesis?.cancel(); setTtsState('idle'); }, [module]);
  useEffect(() => {
    const timer = setInterval(() => {
      setAnalytics(a => { const t2 = [...a.time]; t2[module]++; return {...a, time: t2}; });
    }, 1000);
    return () => clearInterval(timer);
  }, [module]);
  useEffect(() => {
    if (!menuOpen) return;
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);

  const handleClick = () => setAnalytics(a => { const c = [...a.clicks]; c[module]++; return {...a, clicks: c}; });
  const handleQuizSubmit = (mid, correct, total) => {
    setAnalytics(a => {
      const qc = [...a.quizCorrect]; qc[mid] = correct;
      const qt = [...a.quizTotal]; qt[mid] = total;
      return {...a, quizCorrect: qc, quizTotal: qt};
    });
  };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc, ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`), ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      } else if (module >= 1 && module <= N) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`], t[`${mk}_case_title`], t[`${mk}_case`], ...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`), ...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front, term.back])].filter(Boolean);
      } else if (module === N+1) { texts = [t.m7_title, t.m7_desc].filter(Boolean);
      } else if (module === N+2) { texts = [t.mlab_title, t.mlab_desc].filter(Boolean);
      } else { texts = [t.analytics_title, t.analytics_desc].filter(Boolean); }
      const text = texts.join(sep);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if (v) utterance.voice = v; utterance.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&v.name.includes('Daniel'))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if (v) utterance.voice = v; utterance.lang = 'en-GB';
      }
      utterance.onend = () => setTtsState('idle');
      utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  const handleExportCSV = () => {
    const BOM = '\uFEFF';
    const mNavKeys = Array.from({length:N},(_,i)=>`m${i+1}_nav`);

      [t.analytics_group, t.analytics_dept, t.analytics_id, t.analytics_name],
      [studentInfo.group, studentInfo.dept, studentInfo.id, studentInfo.name], [],
      [t.analytics_module, t.analytics_time, t.analytics_clicks, t.analytics_acc, t.analytics_correct_ans_total],
      ...Array.from({length:N}, (_,i) => {

        const acc = analytics.quizTotal[idx] > 0 ? Math.round(analytics.quizCorrect[idx]/analytics.quizTotal[idx]*100)+'%' : t.analytics_no_data;
        const ans = analytics.quizTotal[idx] > 0 ? `${analytics.quizCorrect[idx]}/${analytics.quizTotal[idx]}/8` : t.analytics_no_data;
        return [t[mNavKeys[i]], analytics.time[idx]+t.analytics_sec, analytics.clicks[idx]+t.analytics_times, acc, ans];

    </div>

        <div className="grid md:grid-cols-2 gap-6">

        <div className="mt-8">
          <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{(t[`${mk}_terms`]||[]).map((term,i) => <FlipCard key={i} front={term.front} back={term.back} t={t}/>)}</div>

        {renderNavBottom()}
      </div>

      { label: lang==='zh'?'Masters of Scale: Slack 的大轉型':'Masters of Scale: Slack\'s Big Pivot', url: 'https://mastersofscale.com/stewart-butterfield-the-big-pivot/', desc: lang==='zh'?'Reid Hoffman 與 Stewart Butterfield 深度對談：從失敗遊戲到 Flickr 與 Slack。':'Reid Hoffman interviews Stewart Butterfield on pivoting from failed games to Flickr and Slack.' },
      { label: lang==='zh'?'Y Combinator: 如何與使用者對話':'YC: How to Talk to Users', url: 'https://www.ycombinator.com/library/6g-how-to-talk-to-users', desc: lang==='zh'?'Y Combinator 官方指南：創辦人必學的使用者訪談技巧。':'YC\'s official guide to user interview techniques every founder must learn.' },
      { label: lang==='zh'?'Google Ventures：設計衝刺 Sprint':'Google Ventures: Design Sprint', url: 'https://designsprintkit.withgoogle.com/', desc: lang==='zh'?'Google Ventures 的 5 天設計衝刺框架，快速原型驗證。':'Google Ventures\' 5-day design sprint framework for rapid prototype validation.' },
    ];
    const links2 = [
      { cat: lang==='zh'?'📚 延伸閱讀':'📚 Further Reading', items: [
        { label: 'The Mom Test (Rob Fitzpatrick)', url: 'https://www.momtestbook.com/', desc: lang==='zh'?'如何從顧客口中問出真話，避免社交禮貌性回答。':'How to ask questions that extract honest feedback, avoiding polite social lies.' },
        { label: lang==='zh'?'精實創業 The Lean Startup':'The Lean Startup (Eric Ries)', url: 'https://theleanstartup.com/', desc: lang==='zh'?'Eric Ries 的經典框架：建造-衡量-學習迴圈。':'Eric Ries\' classic Build-Measure-Learn loop framework.' },

        <div className="grid md:grid-cols-2 gap-3">{links1.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
        {links2.map((sec,si)=>(
          <div key={si}>
            <h3 className="text-lg font-bold text-slate-600 dark:text-slate-400 mb-3">{sec.cat}</h3>
            <div className="grid md:grid-cols-2 gap-3">{sec.items.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
          </div>
        ))}
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'免責聲明：外部連結內容由第三方提供，本教材不對其正確性或可用性負責。連結可能隨時變更或失效。':'Disclaimer: External links are provided by third parties. This material is not responsible for their accuracy or availability. Links may change or expire.'}</p>
        </div>
        {renderNavBottom()}
      </div>
    );
  };

  const renderLab = () => (
    <div className="space-y-8 animate-fade-in">
      <H2>{t.mlab_title}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <ElevatorPitchLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <InterviewSimLab lang={lang}/>
        <SurveyDesignLab lang={lang}/>
      </div>
      <div className="grid md:grid-cols-2 gap-6">
        <PrototypeFidelityLab lang={lang}/>
        <WizardOfOzLab lang={lang}/>
      </div>
      <ValidationFlowLab lang={lang}/>
      {renderNavBottom()}
    </div>
  );

  const renderContent = () => {
    const fade = "animate-fade-in";
    // M0
    if (module === 0) return (
      <div className={`space-y-8 text-base leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
        <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white">
          <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
          <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
          <p className="text-[#D8C3A5]/90 text-sm sm:text-base leading-relaxed">{t.m0_intro}</p>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
          <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
          <p className="text-sm sm:text-base">{t.m0_why_desc}</p>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {t.m0_stats.map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
              <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
            </div>
          ))}
        </div>
        <div>
          <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
          <div className="space-y-3">
            {t.m0_modules.map((m,i)=>(
              <button key={i} onClick={()=>setModule(i+1)}
                className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-4 sm:px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                <div className="text-2xl sm:text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                <div className="flex-1 min-w-0">
                  <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1 text-sm sm:text-base">{m.title}</div>
                  <div className="text-xs sm:text-sm text-slate-500 truncate">{m.desc}</div>
                </div>
                <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0"/>
              </button>
            ))}
          </div>
        </div>
        <div className="flex justify-end">
          <button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold rounded-lg hover:bg-[#002b20] transition-colors shadow-md">{t.m0_start}</button>
        </div>
      </div>
    );
    // Learning Modules
    if (module >= 1 && module <= N) return renderModule(module);
    // Resources
    if (module === N+1) return renderResources();
    // Lab
    if (module === N+2) return renderLab();
    // Analytics
    if (module === N+3) {
      const totalTime = analytics.time.reduce((a,b)=>a+b,0);
      const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100)+'%' : t.analytics_no_data;
      const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.name;
      const mNavKeys = Array.from({length:N},(_,i)=>`m${i+1}_nav`);
      return (
        <div className="space-y-6 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <H2>{t.analytics_title}</H2>
          <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
          <div className="grid grid-cols-3 gap-4">
            {[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
                <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
                <p className="text-xs text-slate-500 mt-1">{s.label}</p>
              </div>
            ))}
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
            <table className="w-full text-sm">
              <thead><tr className="bg-[#004030] text-[#D8C3A5]">
                <th className="text-left p-3">{t.analytics_module}</th>
                <th className="text-center p-3">{t.analytics_time}</th>
                <th className="text-center p-3">{t.analytics_clicks}</th>
                <th className="text-center p-3">{t.analytics_acc}</th>
                <th className="text-center p-3 hidden md:table-cell">{t.analytics_correct_ans_total}</th>
              </tr></thead>
              <tbody>{Array.from({length:N},(_,i)=>{
                const idx = i+1;
                const acc = analytics.quizTotal[idx] > 0 ? Math.round(analytics.quizCorrect[idx]/analytics.quizTotal[idx]*100)+'%' : t.analytics_no_data;
                const ans = analytics.quizTotal[idx] > 0 ? `${analytics.quizCorrect[idx]}/${analytics.quizTotal[idx]}/8` : t.analytics_no_data;
                return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                  <td className="p-3 font-medium text-[#004030] dark:text-[#D8C3A5]">{t[mNavKeys[i]]}</td>
                  <td className="p-3 text-center">{analytics.time[idx]}{t.analytics_sec}</td>
                  <td className="p-3 text-center">{analytics.clicks[idx]}{t.analytics_times}</td>
                  <td className="p-3 text-center">{acc}</td>
                  <td className="p-3 text-center hidden md:table-cell">{ans}</td>
                </tr>;
              })}</tbody>
            </table>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_group}</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200">
                  <option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_dept}</label>
                <input value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_id}</label>
                <input value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_name}</label>
                <input value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            </div>
            <button onClick={handleExportCSV} disabled={!canExport} className="mt-4 px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden pt-16`}>
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
                  </div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="font-serif font-black text-lg tracking-widest text-[#D8C3A5]">ENT</div>
              <div className="hidden sm:block text-left">
                <h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1>
                <p className="text-[10px] text-[#D8C3A5]/70">{t.subtitle}</p>
              </div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center space-x-1 mr-2">
              {ttsState!=='playing'
                ? <button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>
                : <button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>}
              {ttsState!=='idle' && <button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
        <aside className="hidden md:block w-64 shrink-0 mr-6">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden md:sticky md:top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700">
              <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
            </div>
            <nav className="space-y-0.5 p-2">
              {modulesList.map(m=>(
                <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}}
                  className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                  <span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span>
                  <span className="truncate">{m.title}</span>
                  {module===m.id && <IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
                </button>
              ))}
            </nav>
          </div>
        </aside>
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
        </main>
      </div>

      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">ENT</div>
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">
              Architect:&nbsp;
              <a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">{t.architect_name}</a>
            </span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3">
              <IconChevronUp size={12} className="md:mr-1"/><span className="hidden sm:inline">TOP</span>
            </button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
